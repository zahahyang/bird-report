<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cloud:#F4F1EC;--cloud-light:#FAF9F6;--cloud-white:#FFFFFF;--warm-50:#F9F6F1;--warm-100:#F0EBE3;--warm-200:#E2DAD0;--warm-300:#C8BFB3;--sage:#7A9E7E;--sage-light:#E8F0E9;--sage-dark:#5B7E5F;--sage-deep:#3D5940;--terracotta:#C08B6E;--terracotta-light:#F5EBE4;--terracotta-dark:#8B5E44;--ink:#3A3632;--ink-light:#6B6560;--ink-lighter:#9E9890;--ink-faint:#C8C3BC;--gold-50:#FDF6E8;--gold-400:#D4A855;--gold-800:#7A5C1F;--rose-50:#FBF0F0;--rose-800:#7A3D3D;--sky-50:#EEF4FA;--sky-800:#2E5470;--red-50:#FBF0EE;--red-600:#B85450;--red-800:#6B2E2C;--bg:var(--cloud);--card-bg:var(--cloud-white);--text:var(--ink);--text-secondary:var(--ink-light);--text-tertiary:var(--ink-lighter);--border:rgba(58,54,50,0.08);--radius:16px;--radius-sm:10px;--shadow-sm:0 1px 3px rgba(58,54,50,0.04),0 1px 2px rgba(58,54,50,0.03);--shadow-md:0 4px 12px rgba(58,54,50,0.06),0 1px 4px rgba(58,54,50,0.04)}
@media(prefers-color-scheme:dark){:root{--cloud:#1C1B19;--cloud-light:#232220;--cloud-white:#2A2927;--warm-50:#252321;--warm-100:#302E2B;--warm-200:#3D3A36;--warm-300:#5A5650;--sage:#7A9E7E;--sage-light:#1E2E20;--sage-dark:#9ECBA2;--sage-deep:#C8E5CA;--terracotta:#D4A080;--terracotta-light:#2E2420;--terracotta-dark:#E8C0A8;--ink:#E8E4DE;--ink-light:#B8B2AA;--ink-lighter:#888078;--ink-faint:#504B46;--gold-50:#2E2818;--gold-800:#F0D090;--rose-50:#2E2020;--rose-800:#F0C0C0;--sky-50:#1A2430;--sky-800:#B8D8F0;--red-50:#2E1E1C;--red-600:#E08080;--red-800:#F0B0AE;--bg:var(--cloud);--card-bg:var(--cloud-white);--text:var(--ink);--text-secondary:var(--ink-light);--text-tertiary:var(--ink-lighter);--border:rgba(232,228,222,0.08);--shadow-sm:0 1px 3px rgba(0,0,0,0.12);--shadow-md:0 4px 12px rgba(0,0,0,0.16)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC','Zen Maru Gothic',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:0 16px 80px}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header-left{display:flex;align-items:center;gap:10px}
.header-left a{text-decoration:none;font-size:14px;color:var(--sage-dark);display:flex;align-items:center;gap:4px}
.header h1{font-size:18px;font-weight:700;letter-spacing:2px}
.header-right{display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary)}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--sage)}
.logout-btn{height:32px;padding:0 12px;font-size:11px;font-weight:500;font-family:inherit;border-radius:20px;cursor:pointer;border:1.5px solid var(--warm-200);background:var(--card-bg);color:var(--text-secondary);transition:all .15s}
.logout-btn:active{background:var(--red-50);color:var(--red-600);border-color:var(--red-600)}
/* Login screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:24px}
.login-screen .icon{font-size:48px;margin-bottom:16px}
.login-screen h2{font-size:20px;font-weight:700;margin-bottom:8px}
.login-screen p{font-size:13px;color:var(--text-secondary);margin-bottom:32px;line-height:1.7}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:280px;height:48px;border:1.5px solid var(--warm-200);border-radius:var(--radius-sm);background:var(--card-bg);font-size:14px;font-weight:500;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s}
.google-btn:active{transform:scale(.98);border-color:var(--sage)}
.google-btn img{width:20px;height:20px}
.back-link{margin-top:20px;font-size:13px;color:var(--ink-lighter);text-decoration:none}
.back-link:hover{color:var(--sage-dark)}
/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;position:sticky;top:0;background:var(--bg);z-index:10;padding:8px 0}
.tab{flex:1;padding:10px 4px;font-size:13px;font-weight:500;color:var(--text-tertiary);text-align:center;border:none;background:var(--warm-50);border-radius:24px;font-family:inherit;cursor:pointer;transition:all .25s;letter-spacing:.5px}
.tab.active{color:var(--cloud-white);background:var(--sage-deep)}
.tab:active{transform:scale(.97)}
.tab-content{display:none}.tab-content.active{display:block}
.section-label{font-size:11px;font-weight:500;color:var(--ink-lighter);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:1.5px}
/* Dashboard cards */
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.dash-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.dash-card.wide{grid-column:1/-1}
.dash-number{font-size:36px;font-weight:700;color:var(--sage-dark)}
.dash-sub{font-size:11px;color:var(--ink-lighter);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.dash-icon{font-size:22px;margin-bottom:6px}
.streak-fire{color:#E8A040}
/* Top bird rows */
.top-bird-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.top-bird-row:last-child{border:none}
.top-bird-rank-num{font-size:18px;font-weight:700;color:var(--ink-faint);width:28px;text-align:center}
.top-bird-svg{width:56px;height:46px}
.top-bird-svg svg{width:100%;height:100%}
.top-bird-info{flex:1}
.top-bird-name{font-size:15px;font-weight:700}
.top-bird-count{font-size:12px;color:var(--text-secondary)}
/* Charts */
.monthly-chart{margin-top:8px}
.month-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.month-bar-label{font-size:12px;width:80px;text-align:right;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-bar-track{flex:1;height:24px;background:var(--warm-100);border-radius:12px;overflow:hidden}
.month-bar-fill{height:100%;border-radius:12px;background:var(--sage);transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:24px}
.month-bar-count{font-size:10px;font-weight:700;color:#fff}
/* Bird grid */
.bird-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.bird-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px 12px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
.bird-card:active{transform:scale(.97)}
.bird-emoji{font-size:30px;margin-bottom:6px}
.bird-name{font-size:14px;font-weight:700}
.bird-desc{font-size:11px;color:var(--text-secondary);margin-top:3px}
.bird-rank{display:inline-block;margin-top:8px;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:1px}
.bird-count{font-size:11px;color:var(--ink-faint);margin-top:4px}
.rank-sss{background:var(--gold-50);color:var(--gold-800);border:1px solid rgba(212,168,85,.2)}
.rank-ss{background:var(--rose-50);color:var(--rose-800);border:1px solid rgba(200,123,123,.15)}
.rank-s{background:var(--sky-50);color:var(--sky-800);border:1px solid rgba(107,157,199,.15)}
.rank-a{background:var(--sage-light);color:var(--sage-deep);border:1px solid rgba(122,158,126,.15)}
.rank-b{background:var(--warm-50);color:var(--ink-light);border:1px solid var(--warm-200)}
.rank-c{background:var(--warm-50);color:var(--ink-lighter);border:1px solid var(--warm-200)}
.rank-d{background:var(--red-50);color:var(--red-800);border:1px solid rgba(184,84,80,.12)}
/* Lore database */
.lore-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm)}
.lore-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;transition:background .15s}
.lore-header:active{background:var(--warm-50)}
.lore-bird-svg{width:56px;height:46px;flex-shrink:0}
.lore-bird-svg svg{width:100%;height:100%}
.lore-bird-emoji{font-size:28px;flex-shrink:0;width:56px;text-align:center}
.lore-bird-info{flex:1}
.lore-bird-name{font-size:15px;font-weight:700}
.lore-bird-rank-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.lore-bird-desc{font-size:12px;color:var(--text-secondary);margin-top:3px;line-height:1.5}
.lore-chevron{font-size:14px;color:var(--ink-faint);transition:transform .2s}
.lore-chevron.open{transform:rotate(180deg)}
.lore-body{display:none;padding:0 16px 16px;animation:slideIn .3s ease}
.lore-body.open{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.lore-section{margin-top:14px}
.lore-section-title{font-size:11px;font-weight:700;color:var(--ink-lighter);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.lore-text{font-size:13px;line-height:1.9;color:var(--text-secondary)}
.lore-mama{font-size:15px;color:var(--sage-dark);font-weight:700;margin-top:12px;padding:12px 16px;background:var(--sage-light);border-radius:var(--radius-sm)}
.lore-stats{display:flex;gap:16px;margin-top:12px;padding:10px 14px;background:var(--warm-50);border-radius:var(--radius-sm)}
.lore-stat{text-align:center;flex:1}
.lore-stat-value{font-size:18px;font-weight:700;color:var(--sage-dark)}
.lore-stat-label{font-size:10px;color:var(--ink-lighter);text-transform:uppercase;letter-spacing:.5px}
.empty-log{text-align:center;padding:40px 16px;color:var(--ink-faint);font-size:13px;line-height:2}
.goodnews-entry{display:flex;align-items:flex-start;gap:10px;padding:14px;background:var(--gold-50);border:1px solid rgba(212,168,85,.15);border-radius:var(--radius-sm);margin-bottom:8px;box-shadow:var(--shadow-sm)}
.goodnews-icon{font-size:20px;padding-top:2px}
.goodnews-content{font-size:13px;line-height:1.7;flex:1}
.goodnews-type{font-weight:700;color:var(--gold-800)}
.goodnews-note{color:var(--text-secondary);font-style:italic}
.goodnews-birds{font-size:11px;color:var(--ink-lighter);margin-top:4px}
.accuracy-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.accuracy-row:last-child{border:none}
.accuracy-bird-svg{width:40px;height:34px;flex-shrink:0}
.accuracy-bird-svg svg{width:100%;height:100%}
.accuracy-bird{font-size:14px;font-weight:700;flex:1}
.accuracy-pct{font-size:16px;font-weight:700;color:var(--sage-dark)}
.accuracy-count{font-size:11px;color:var(--ink-lighter);width:60px;text-align:right}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cloud-light);padding:12px 24px;border-radius:28px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.show{opacity:1}
@media(min-width:481px){.container{padding:0 24px 40px}.dash-grid{grid-template-columns:repeat(4,1fr)}.bird-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:769px){.container{max-width:800px}}
</style>
</head>

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function calcFortune(arr){if(!arr.length)return 0;let t=0;arr.forEach(s=>{t+=(birdData[s.bird]?birdData[s.bird].fortune:0)});return Math.round(t/arr.length)}

// Auth
async function googleSignIn(){try{await signInWithPopup(auth,new GoogleAuthProvider())}catch(e){showToast('登入失敗')}}
function doLogout(){signOut(auth);showToast('已登出')}

onAuthStateChanged(auth,user=>{
if(user&&user.email===ADMIN_EMAIL){
document.getElementById('login-screen').style.display='none';
document.getElementById('admin-content').style.display='block';
document.getElementById('user-photo').src=user.photoURL||'';
document.getElementById('user-name').textContent=user.displayName||user.email;
loadData();
}else if(user){
signOut(auth);showToast('此帳號無權限');
}else{
document.getElementById('login-screen').style.display='flex';
document.getElementById('admin-content').style.display='none';
}
});

async function loadData(){
try{
const ss=await getDocs(collection(db,'sightings'));allSightings=[];ss.forEach(d=>{allSightings.push(d.data())});allSightings.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
const vq=await getDocs(collection(db,'verifications'));verifyData={};vq.forEach(d=>{verifyData[d.id]=d.data().result});
const gq=await getDocs(collection(db,'goodnews'));goodNews=[];gq.forEach(d=>{goodNews.push(d.data())});goodNews.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
const bq=await getDocs(collection(db,'badnews'));badNews=[];bq.forEach(d=>{badNews.push(d.data())});badNews.sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
}catch(e){console.error(e)}
renderAll();
}

function getBirdsBeforeDate(date,days){const d=new Date(date);const birds=new Set();for(let i=0;i<=days;i++){const dd=new Date(d);dd.setDate(dd.getDate()-i);const ds=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');allSightings.filter(s=>s.date===ds).forEach(s=>birds.add(s.bird))}return birds}
function formatDate(ds){const p=ds.split('-');return p[0]+'/'+p[1]+'/'+p[2]}

function renderAll(){renderDashboard();renderGuide();renderLore()}

function renderDashboard(){
const now=new Date(),ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
const monthS=allSightings.filter(s=>s.date&&s.date.startsWith(ym));
document.getElementById('dash-total').textContent=allSightings.length;
document.getElementById('dash-month').textContent=monthS.length;
const vD=Object.keys(verifyData),tV=vD.length,cV=vD.filter(d=>verifyData[d]==='yes').length;
document.getElementById('dash-accuracy').textContent=tV>0?Math.round(cV/tV*100)+'%':'?%';
// Streak
const dates=[...new Set(allSightings.map(s=>s.date))].sort().reverse();let streak=0;const today=getToday();
for(let i=0;i<dates.length;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(dates.includes(ds))streak++;else break}
document.getElementById('dash-streak').textContent=streak;
// Good news stats
document.getElementById('dash-goodnews').textContent=goodNews.length;
const monthGN=goodNews.filter(g=>g.date&&g.date.startsWith(ym));
document.getElementById('dash-goodnews-month').textContent=monthGN.length;
// Bird prediction accuracy
const birdHits={},birdTotalCount={};birdOrder.forEach(k=>{birdHits[k]=0;birdTotalCount[k]=0});
allSightings.forEach(s=>{if(birdData[s.bird])birdTotalCount[s.bird]++});
goodNews.forEach(g=>{const birds=getBirdsBeforeDate(g.date,3);birds.forEach(b=>{if(birdData[b])birdHits[b]++})});
const accRows=birdOrder.filter(k=>birdTotalCount[k]>0).map(k=>({key:k,hits:birdHits[k],total:birdTotalCount[k],pct:birdTotalCount[k]>0?Math.round(birdHits[k]/birdTotalCount[k]*100):0})).sort((a,b)=>b.pct-a.pct);
let accH='';if(accRows.length&&goodNews.length){accRows.forEach(r=>{const b=birdData[r.key];accH+='<div class="accuracy-row"><div class="accuracy-bird-svg">'+(birdSVG[r.key]||'<span style="font-size:20px">'+b.emoji+'</span>')+'</div><div class="accuracy-bird">'+b.name+'</div><div class="accuracy-count">'+r.hits+'/'+r.total+'</div><div class="accuracy-pct">'+r.pct+'%</div></div>'})}else{accH='<div class="empty-log">\u9700\u8981\u66F4\u591A\u9CE5\u985E\u901A\u5831\u8207\u597D\u4E8B\u7D00\u9304\u624D\u80FD\u8A08\u7B97</div>'}
document.getElementById('dash-bird-accuracy').innerHTML=accH;
// Good news type distribution
const typeCounts={};goodNews.forEach(g=>{typeCounts[g.type]=(typeCounts[g.type]||0)+1});
const typeSorted=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);const typeMax=typeSorted.length?typeSorted[0][1]:1;
let typeH='<div class="monthly-chart">';typeSorted.forEach(([type,cnt])=>{const t=goodNewsTypes[type]||{icon:'\u{1F389}',label:type};typeH+='<div class="month-bar-row"><div class="month-bar-label">'+t.icon+' '+t.label+'</div><div class="month-bar-track"><div class="month-bar-fill" style="width:'+Math.round(cnt/typeMax*100)+'%;background:var(--gold-400)"><span class="month-bar-count">'+cnt+'</span></div></div></div>'});typeH+='</div>';
document.getElementById('dash-goodnews-types').innerHTML=typeSorted.length?typeH:'<div class="empty-log">\u5C1A\u7121\u597D\u4E8B\u7D00\u9304</div>';
// Good news log
let gnH='';if(goodNews.length){goodNews.slice().reverse().slice(0,10).forEach(g=>{const t=goodNewsTypes[g.type]||{icon:'\u{1F389}',label:'\u597D\u4E8B'};const birds=getBirdsBeforeDate(g.date,3);let birdsStr='';if(birds.size>0){const bArr=[];birds.forEach(b=>{if(birdData[b])bArr.push(birdData[b].emoji+' '+birdData[b].name)});birdsStr='\u{1F426} '+bArr.join('\u3001')}
gnH+='<div class="goodnews-entry"><div class="goodnews-icon">'+t.icon+'</div><div class="goodnews-content"><span class="goodnews-type">'+t.label+'</span> <span style="font-size:11px;color:var(--ink-faint)">'+formatDate(g.date)+' '+g.time+'</span>';if(g.note)gnH+='<br><span class="goodnews-note">'+g.note+'</span>';if(birdsStr)gnH+='<br><span class="goodnews-birds">'+birdsStr+'</span>';gnH+='</div></div>'})}else{gnH='<div class="empty-log">\u5C1A\u7121\u597D\u4E8B\u7D00\u9304</div>'}
document.getElementById('dash-goodnews-log').innerHTML=gnH;
// Bad news stats
document.getElementById('dash-badnews').textContent=badNews.length;
const monthBN=badNews.filter(g=>g.date&&g.date.startsWith(ym));
document.getElementById('dash-badnews-month').textContent=monthBN.length;
// Bad news bird warning rate
const badBirdHits={},badBirdTotal={};birdOrder.forEach(k=>{badBirdHits[k]=0;badBirdTotal[k]=0});
allSightings.forEach(s=>{if(birdData[s.bird])badBirdTotal[s.bird]++});
badNews.forEach(g=>{const birds=getBirdsBeforeDate(g.date,3);birds.forEach(b=>{if(birdData[b])badBirdHits[b]++})});
const badAccRows=birdOrder.filter(k=>badBirdTotal[k]>0).map(k=>({key:k,hits:badBirdHits[k],total:badBirdTotal[k],pct:badBirdTotal[k]>0?Math.round(badBirdHits[k]/badBirdTotal[k]*100):0})).sort((a,b)=>b.pct-a.pct);
let badAccH='';if(badAccRows.length&&badNews.length){badAccRows.forEach(r=>{const b=birdData[r.key];badAccH+='<div class="accuracy-row"><div class="accuracy-bird-svg">'+(birdSVG[r.key]||'<span style="font-size:20px">'+b.emoji+'</span>')+'</div><div class="accuracy-bird">'+b.name+'</div><div class="accuracy-count">'+r.hits+'/'+r.total+'</div><div class="accuracy-pct" style="color:var(--red-600)">'+r.pct+'%</div></div>'})}else{badAccH='<div class="empty-log">\u6C92\u6709\u5012\u9709\u4E8B = \u6700\u597D\u7684\u7D50\u679C</div>'}
document.getElementById('dash-bird-badluck').innerHTML=badAccH;
// Bad news type distribution
const badTypeCounts={};badNews.forEach(g=>{badTypeCounts[g.type]=(badTypeCounts[g.type]||0)+1});
const badTypeSorted=Object.entries(badTypeCounts).sort((a,b)=>b[1]-a[1]);const badTypeMax=badTypeSorted.length?badTypeSorted[0][1]:1;
let badTypeH='<div class="monthly-chart">';badTypeSorted.forEach(([type,cnt])=>{const t=badNewsTypes[type]||{icon:'\u{1F629}',label:type};badTypeH+='<div class="month-bar-row"><div class="month-bar-label">'+t.icon+' '+t.label+'</div><div class="month-bar-track"><div class="month-bar-fill" style="width:'+Math.round(cnt/badTypeMax*100)+'%;background:var(--red-600)"><span class="month-bar-count">'+cnt+'</span></div></div></div>'});badTypeH+='</div>';
document.getElementById('dash-badnews-types').innerHTML=badTypeSorted.length?badTypeH:'<div class="empty-log">\u5C1A\u7121\u5012\u9709\u7D00\u9304</div>';
// Bad news log
let bnH='';if(badNews.length){badNews.slice().reverse().slice(0,10).forEach(g=>{const t=badNewsTypes[g.type]||{icon:'\u{1F629}',label:'\u5012\u9709\u4E8B'};const birds=getBirdsBeforeDate(g.date,3);let birdsStr='';if(birds.size>0){const bArr=[];birds.forEach(b=>{if(birdData[b])bArr.push(birdData[b].emoji+' '+birdData[b].name)});birdsStr='\u{1F426} '+bArr.join('\u3001')}
bnH+='<div class="goodnews-entry" style="background:var(--red-50);border-color:rgba(184,84,80,.12)"><div class="goodnews-icon">'+t.icon+'</div><div class="goodnews-content"><span class="goodnews-type" style="color:var(--red-800)">'+t.label+'</span> <span style="font-size:11px;color:var(--ink-faint)">'+formatDate(g.date)+' '+g.time+'</span>';if(g.note)bnH+='<br><span class="goodnews-note">'+g.note+'</span>';if(birdsStr)bnH+='<br><span class="goodnews-birds">'+birdsStr+'</span>';bnH+='</div></div>'})}else{bnH='<div class="empty-log">\u5C1A\u7121\u5012\u9709\u7D00\u9304 \u{1F64F}</div>'}
document.getElementById('dash-badnews-log').innerHTML=bnH;
// Top 5
const counts={};allSightings.forEach(s=>{counts[s.bird]=(counts[s.bird]||0)+1});
const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
let t5='';sorted.forEach(([key,cnt],i)=>{const b=birdData[key];if(!b)return;t5+='<div class="top-bird-row"><div class="top-bird-rank-num">'+(i+1)+'</div><div class="top-bird-svg">'+(birdSVG[key]||'<span style="font-size:28px">'+b.emoji+'</span>')+'</div><div class="top-bird-info"><div class="top-bird-name">'+b.name+' <span class="bird-rank '+b.rankClass+'" style="font-size:9px;padding:1px 6px">'+b.rank+'</span></div><div class="top-bird-count">'+cnt+' 次目擊</div></div></div>'});
document.getElementById('dash-top5').innerHTML=t5||'<div class="empty-log">尚無資料</div>';
// Monthly birds
const mCounts={};monthS.forEach(s=>{mCounts[s.bird]=(mCounts[s.bird]||0)+1});
const mSorted=Object.entries(mCounts).sort((a,b)=>b[1]-a[1]);const mMax=mSorted.length?mSorted[0][1]:1;
let mb='<div class="monthly-chart">';mSorted.forEach(([key,cnt])=>{const b=birdData[key];if(!b)return;mb+='<div class="month-bar-row"><div class="month-bar-label">'+b.emoji+' '+b.name+'</div><div class="month-bar-track"><div class="month-bar-fill" style="width:'+Math.round(cnt/mMax*100)+'%"><span class="month-bar-count">'+cnt+'</span></div></div></div>'});mb+='</div>';
document.getElementById('dash-monthly-birds').innerHTML=mSorted.length?mb:'<div class="empty-log">本月尚無</div>';
// Locations
const locC={};allSightings.forEach(s=>{if(s.loc)locC[s.loc]=(locC[s.loc]||0)+1});
const locS=Object.entries(locC).sort((a,b)=>b[1]-a[1]);const locMax=locS.length?locS[0][1]:1;
let lh='<div class="monthly-chart">';locS.forEach(([loc,cnt])=>{lh+='<div class="month-bar-row"><div class="month-bar-label">'+loc+'</div><div class="month-bar-track"><div class="month-bar-fill" style="width:'+Math.round(cnt/locMax*100)+'%;background:var(--terracotta)"><span class="month-bar-count">'+cnt+'</span></div></div></div>'});lh+='</div>';
document.getElementById('dash-locations').innerHTML=locS.length?lh:'<div class="empty-log">尚無地點資料</div>';
// Fortune trend
const byDay={};monthS.forEach(s=>{if(!byDay[s.date])byDay[s.date]=[];byDay[s.date].push(s)});
const days=Object.keys(byDay).sort();const maxF=Math.max(...days.map(d=>calcFortune(byDay[d])),1);
let fh='<div class="monthly-chart">';days.forEach(d=>{const f=calcFortune(byDay[d]);const pct=Math.max(5,Math.round(f/maxF*100));fh+='<div class="month-bar-row"><div class="month-bar-label">'+d.split('-')[2]+'日</div><div class="month-bar-track"><div class="month-bar-fill" style="width:'+pct+'%"><span class="month-bar-count">'+f+'</span></div></div></div>'});fh+='</div>';
document.getElementById('dash-fortune-trend').innerHTML=days.length?fh:'<div class="empty-log">本月尚無</div>';
}

function renderGuide(){
const c=document.getElementById('ranking-grid'),counts={};
allSightings.forEach(s=>{counts[s.bird]=(counts[s.bird]||0)+1});
let h='';birdOrder.forEach(key=>{const b=birdData[key],count=counts[key]||0;
h+='<div class="bird-card" onclick="showLoreDetail(\''+key+'\')"><div class="bird-emoji">'+(birdSVG[key]?'<div style="width:60px;height:50px;margin:0 auto">'+birdSVG[key]+'</div>':b.emoji)+'</div><div class="bird-name">'+b.name+'</div><div class="bird-desc">'+b.desc.substring(0,12)+'...</div><div class="bird-rank '+b.rankClass+'">'+b.rank+'</div>';
if(count>0)h+='<div class="bird-count">目擊 '+count+' 次</div>';
h+='</div>'});c.innerHTML=h;
}

function showLoreDetail(key){switchTab('lore',document.querySelectorAll('.tab')[2]);setTimeout(()=>{const cards=document.querySelectorAll('.lore-card');const idx=birdOrder.indexOf(key);if(idx>=0&&cards[idx]){cards[idx].scrollIntoView({behavior:'smooth',block:'start'});const header=cards[idx].querySelector('.lore-header');if(header)toggleLore(header)}},100)}

function renderLore(){
const c=document.getElementById('lore-list'),counts={};
allSightings.forEach(s=>{counts[s.bird]=(counts[s.bird]||0)+1});
let h='';birdOrder.forEach(key=>{const b=birdData[key],count=counts[key]||0;
h+='<div class="lore-card"><div class="lore-header" onclick="toggleLore(this)"><div class="lore-bird-svg">'+(birdSVG[key]||'<div class="lore-bird-emoji">'+b.emoji+'</div>')+'</div><div class="lore-bird-info"><div class="lore-bird-name">'+b.name+' <span class="lore-bird-rank-tag '+b.rankClass+'">'+b.rank+'</span></div><div class="lore-bird-desc">'+b.desc+'</div></div><div class="lore-chevron">&#x25BC;</div></div>';
h+='<div class="lore-body"><div class="lore-stats"><div class="lore-stat"><div class="lore-stat-value">+'+b.fortune+'</div><div class="lore-stat-label">運勢值</div></div><div class="lore-stat"><div class="lore-stat-value">'+b.rank+'</div><div class="lore-stat-label">等級</div></div><div class="lore-stat"><div class="lore-stat-value">'+count+'</div><div class="lore-stat-label">目擊數</div></div></div>';
h+='<div class="lore-section"><div class="lore-section-title">&#x1F4DC; 風水典故</div><div class="lore-text">'+b.lore+'</div></div>';
h+='<div class="lore-mama">'+b.mama+'</div></div></div>'});
c.innerHTML=h;
}

function toggleLore(el){const body=el.nextElementSibling;const chevron=el.querySelector('.lore-chevron');body.classList.toggle('open');chevron.classList.toggle('open')}

function switchTab(name,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');if(el)el.classList.add('active')}

window.googleSignIn=googleSignIn;window.doLogout=doLogout;window.switchTab=switchTab;window.toggleLore=toggleLore;window.showLoreDetail=showLoreDetail;
</script>
</body>
</html>
